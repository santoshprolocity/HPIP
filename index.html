

<!-- INVESTOR METRICS (Investor Mode Only) -->
<section class="py-20 px-6 bg-black investor-only">
  <h2 class="text-3xl font-bold text-center mb-12">Market Opportunity</h2>
  <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-10">
    <div class="bg-gray-900 p-6 rounded-2xl">
      <canvas id="tamChart"></canvas>
    </div>
    <div class="bg-gray-900 p-6 rounded-2xl">
      <canvas id="revenueChart"></canvas>
    </div>
  </div>
  <div class="text-center mt-10">
    <button onclick="downloadInvestorDeck()" class="border px-6 py-3 rounded-xl">Download Investor Deck (PDF)</button>
  </div>
</section>

<!-- LIVE AI INFERENCE DEMO -->
<section class="py-20 px-6 bg-gray-950 text-center">
  <h2 class="text-3xl font-bold mb-10">Live AI Inference Demo</h2>
  <div class="max-w-xl mx-auto bg-gray-900 p-6 rounded-2xl">
    <input id="inferenceInput" type="number" placeholder="Enter Fatigue Index (1-100)" class="w-full p-3 mb-4 rounded bg-black border border-gray-700">
    <button onclick="runInference()" class="bg-white text-black px-6 py-3 rounded-xl w-full">Run AI Prediction</button>
    <div class="mt-6 text-xl">Predicted Injury Risk: <span id="inferenceOutput">--</span>%</div>
  </div>
</section>

<!-- GATED WHITEPAPER -->
<section class="py-20 px-6 text-center">
  <h2 class="text-3xl font-bold mb-8">Download Research Whitepaper</h2>
  <div class="max-w-md mx-auto bg-gray-900 p-6 rounded-2xl">
    <input id="whitepaperEmail" type="email" placeholder="Enter email to unlock" class="w-full p-3 mb-4 rounded bg-black border border-gray-700">
    <button onclick="unlockWhitepaper()" class="bg-white text-black px-6 py-3 rounded-xl w-full">Unlock PDF</button>
    <div id="whitepaperLink" class="mt-6 hidden">
      <a href="#" class="underline">Download Whitepaper.pdf</a>
    </div>
  </div>
</section>

<script>

// ---------------- TAM & Revenue Charts ----------------
new Chart(document.getElementById('tamChart'), {
  type: 'bar',
  data: {
    labels: ['Performance Tech','Corporate Wellness','Elite Sports'],
    datasets: [{
      label: 'TAM ($B)',
      data: [45, 60, 25],
      backgroundColor: 'white'
    }]
  }
});

new Chart(document.getElementById('revenueChart'), {
  type: 'line',
  data: {
    labels: ['Year 1','Year 2','Year 3','Year 4','Year 5'],
    datasets: [{
      label: 'Projected ARR ($M)',
      data: [1, 5, 18, 55, 140],
      borderColor: 'white'
    }]
  }
});

// ---------------- Mock AI Inference ----------------
function runInference() {
  const input = parseInt(document.getElementById('inferenceInput').value);
  if (!input) return;

  // Simulated async API call
  setTimeout(() => {
    const risk = Math.min(95, Math.max(5, Math.round(input * 0.6 + Math.random() * 10)));
    document.getElementById('inferenceOutput').innerText = risk;
  }, 800);
}

// ---------------- Whitepaper Unlock ----------------
function unlockWhitepaper() {
  const email = document.getElementById('whitepaperEmail').value;
  if (!email.includes('@')) {
    alert('Enter valid email');
    return;
  }
  document.getElementById('whitepaperLink').classList.remove('hidden');
}

// ---------------- Investor Deck PDF ----------------
function downloadInvestorDeck() {
  const content = `Human Potential Intelligence Platform

Market Opportunity: $130B+
5-Year ARR Projection: $140M
Hybrid Strategy: Pro-tier halo + Mass adoption
AI Core: Multi-task transformer models
Infrastructure: Kubernetes + Timescale + Kafka
`;
  const blob = new Blob([content], { type: 'application/pdf' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'Investor_Deck.pdf';
  link.click();
}

</script>

</body>
</html>
